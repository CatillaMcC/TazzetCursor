<!DOCTYPE html>
<html lang="en-IE">
<head>
<meta charset="UTF-8">
<title>Signing in...</title>
<style>
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#062c3a;font-family:Montserrat,sans-serif;}
.msg{color:#efeee7;font-size:.95rem;opacity:.7;}
</style>
</head>
<body>
<p class="msg">Signing in...</p>
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  if (!code) {
    window.location.href = '/login?auth_error=no_token';
    return;
  }
  fetch('/api/auth/oauth-exchange', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code: code }),
  })
    .then(function (r) {
      if (!r.ok) throw new Error('exchange failed');
      return r.json();
    })
    .then(function (d) {
      if (!d || !d.token) throw new Error('no token');
      try {
        localStorage.setItem('tazzet_jwt', d.token);
      } catch (e) {
        window.location.href = '/login?auth_error=storage';
        return;
      }
      window.location.href = '/';
    })
    .catch(function () {
      window.location.href = '/login?auth_error=exchange_failed';
    });
})();
</script>
</body>
</html>
