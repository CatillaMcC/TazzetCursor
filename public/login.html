<!DOCTYPE html>
<html lang="en-IE">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — Tazzet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --t-primary:#4E8D99;
  --t-dark:#1A3540;
  --t-mid:#2E5A63;
  --t-peach:#EBBA95;
  --t-plum:#6D445E;
  --t-light:#F5F0EC;
  --t-white:#FFFFFF;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--t-dark);
  font-family:'Barlow',sans-serif;
  font-weight:400;
  padding:1.5rem;
  position:relative;
  overflow:hidden;
}

/* Subtle background accent */
body::before{
  content:'';
  position:absolute;
  top:-30%;
  right:-15%;
  width:600px;
  height:600px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(78,141,153,.18) 0%, transparent 70%);
  pointer-events:none;
}
body::after{
  content:'';
  position:absolute;
  bottom:-20%;
  left:-10%;
  width:400px;
  height:400px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(109,68,94,.15) 0%, transparent 70%);
  pointer-events:none;
}

.card{
  width:100%;
  max-width:420px;
  position:relative;
  z-index:1;
  text-align:center;
}

.logo-wrap{
  margin-bottom:2rem;
}

.wordmark{
  font-family:'Barlow Condensed',sans-serif;
  font-size:2.8rem;
  font-weight:700;
  color:var(--t-white);
  letter-spacing:.5px;
  line-height:1;
  text-transform:uppercase;
}

.wordmark-dot{
  color:var(--t-peach);
}

.tagline{
  color:rgba(245,240,236,.45);
  font-size:.8rem;
  font-weight:300;
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-top:.35rem;
}

.panel{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(78,141,153,.2);
  border-radius:16px;
  padding:2rem;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}

.panel-label{
  color:rgba(245,240,236,.55);
  font-size:.75rem;
  font-weight:500;
  letter-spacing:.1em;
  text-transform:uppercase;
  margin-bottom:1.5rem;
}

.error-box{
  background:rgba(235,186,149,.12);
  border:1px solid rgba(235,186,149,.3);
  border-radius:8px;
  color:var(--t-peach);
  font-size:.85rem;
  font-weight:400;
  padding:.75rem 1rem;
  margin-bottom:1.25rem;
  display:none;
  text-align:left;
  line-height:1.5;
}
.error-box.visible{display:block}

.google-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:.75rem;
  width:100%;
  background:var(--t-white);
  color:#3c4043;
  border:none;
  border-radius:10px;
  padding:.85rem 1.5rem;
  font-size:.9rem;
  font-weight:500;
  font-family:'Barlow',sans-serif;
  letter-spacing:.01em;
  text-decoration:none;
  cursor:pointer;
  transition:box-shadow .2s, transform .15s;
  margin-bottom:1rem;
}
.google-btn:hover{
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  transform:translateY(-1px);
}
.google-btn:active{transform:none}

.divider{
  display:flex;
  align-items:center;
  gap:.75rem;
  margin:.25rem 0 1rem;
}
.divider-line{
  flex:1;
  height:1px;
  background:rgba(78,141,153,.2);
}
.divider-txt{
  color:rgba(245,240,236,.3);
  font-size:.75rem;
  font-weight:300;
  white-space:nowrap;
}

.footer{
  color:rgba(245,240,236,.2);
  font-size:.72rem;
  font-weight:300;
  margin-top:1.75rem;
  letter-spacing:.05em;
}

.checking{
  color:rgba(245,240,236,.45);
  font-size:.85rem;
  font-weight:300;
  margin-bottom:1rem;
  display:none;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <div class="wordmark">Tazzet<span class="wordmark-dot">.</span></div>
    <div class="tagline">AI-powered eLearning authoring</div>
  </div>

  <div class="panel">
    <div class="checking" id="checking">Checking session&hellip;</div>
    <div class="error-box" id="error-box"></div>
    <p class="panel-label">Sign in to your workspace</p>
    <a href="/api/auth/google" class="google-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </a>
  </div>

  <p class="footer">Tazzet &nbsp;&middot;&nbsp; Amplify Infrastructure</p>
</div>

<script>
(async function() {
  var params  = new URLSearchParams(window.location.search);
  var errCode = params.get('auth_error');
  if (errCode) {
    var msgs = {
      cancelled:     'Sign-in was cancelled.',
      db_unavailable:'Database not available. Please try again in a moment.',
      token_exchange:'Google authentication failed. Please try again.',
      no_email:      'No email address returned from Google.',
      server_error:  'A server error occurred. Please try again.',
      no_token:      'No token received after sign-in.',
      exchange_failed:'Sign-in could not be completed. Please try again.',
      storage:       'Could not save session (localStorage blocked?).',
      failed:        'Sign-in failed. Please try again.'
    };
    var detail = params.get('detail');
    var box = document.getElementById('error-box');
    box.textContent = (msgs[errCode] || 'Sign-in failed.') + (detail ? ' (' + detail + ')' : ' (code: ' + errCode + ')');
    box.classList.add('visible');
  }

  var stored = localStorage.getItem('tazzet_jwt');
  if (stored) {
    document.getElementById('checking').style.display = 'block';
    try {
      var res = await fetch('/api/auth/me', {
        headers: { 'Authorization': 'Bearer ' + stored },
        signal: AbortSignal.timeout(5000)
      });
      if (res.ok) { window.location.href = '/'; return; }
      localStorage.removeItem('tazzet_jwt');
      localStorage.removeItem('tazzet_user');
    } catch(_) {}
    document.getElementById('checking').style.display = 'none';
  }
})();
</script>
</body>
</html>
